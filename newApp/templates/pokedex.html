{% extends 'base.html' %}

{% block content %}
<h1>Pokedex</h1>
<form method="POST">
	{%csrf_token%}
	<input type="text" name="pokemon" placeholder="Type a pokemon name">
	<button type="submit">Search pokemon</button>
</form>
{% if pokemon_data%}
	<h2>{{pokemon_data.name|title}}</h2>
	<p>{{pokemon_data.types|join:','}}</p>
	<p>{{pokemon_data.id}}</p>
	<img src ="{{pokemon_data.image}}">
{%endif%}
{% endblock %}
