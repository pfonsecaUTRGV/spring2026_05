<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>
    <h1>Task Manager - Django Web App</h1>

    <h2>Add a New Task</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Task</button>
    </form>

    <hr>

    <h2>Task List</h2>
    <ul>
        {% for task in tasks %}
            <li>
                {{ task.title }} -
                {% if task.completed %}
                    Completed
                {% else %}
                    Not Completed
                {% endif %}
            </li>
        {% empty %}
            <li>No tasks yet.</li>
        {% endfor %}
    </ul>
</body>
</html>
